name: Development CI

on:
  push:
    branches: ["*"]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
  pull_request:
    branches: main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'

jobs:

  native:

    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform: 
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-12
          - macos-latest
          - windows-latest

    steps:
      - run: g-ir-scanner
