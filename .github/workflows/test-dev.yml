name: Node.js CI

on:
  push:
    branches: ["*"]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
  pull_request:
    branches: main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'

jobs:
  prebuild-install:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform: 
          - macos-12
          - macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm install --skip-magickwand-wasm --skip-magickwand-native
      - run: |
          while true; do                         \
            npx prebuild-install -d --verbose    \
            rm -rf /Users/runner/.npm/_prebuilds \
            rm -rf lib/binding                   \
          done
