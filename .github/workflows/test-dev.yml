name: Node.js CI

on:
  push:
    branches: ["*"]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
  pull_request:
    branches: main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'

jobs:
  native:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install the xpacks
        run: |
          npm install xpm
          npx xpm install
      - name: Get conan home
        shell: bash
        id: conan_home
        run: |
          npx xpm run -q conan -- version
          echo path=`npx xpm run -q conan -- config home` >> $GITHUB_OUTPUT
      - name: Cache conan artifacts
        id: conan-artifacts
        uses: actions/cache@v4
        with:
          path: ${{ steps.conan_home.outputs.path }}
          key: ${{ runner.os }}-conan
      - name: Build magickwand.js
        run: |
          npm run deps:download
          npx xpm run prepare --config native
          npx xpm run build --config native
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
      - uses: actions/upload-artifact@v4
        with:
          name: lib
          path: lib
      - run: npx mocha test/node.test.ts test/integration.test.ts
        env:
          MOCHA_INTEGRATION: node
          MOCHA_MAGICK_INSTALL: "node -e \"fs.symlinkSync(process.env.GITHUB_WORKSPACE, path.resolve('node_modules', 'magickwand.js'), os.platform() == 'win32' ? 'junction': 'dir')\""

