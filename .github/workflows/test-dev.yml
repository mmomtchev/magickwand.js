name: Node.js CI

on:
  push:
    branches: ["*"]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
  pull_request:
    branches: main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'

jobs:
  native:
    runs-on: self-hosted

    strategy:
      fail-fast: false

    steps:
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install the xpacks
        run: |
          npm install xpm
          npx xpm install
      - name: Build magickwand.js
        run: |
          npm run deps:download
          npx xpm run prepareConan --config native
          npx xpm run prepareMeson --config native -- -Db_sanitize=address
          npx xpm run build --config native
      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: build
      - uses: actions/upload-artifact@v4
        with:
          name: lib
          path: lib
      - run: |
         withdll.exe /d:"%VCToolsInstallDir%\bin\Hostx64\x64\clang_rt.asan_dynamic-x86_64.dll" node node_modules\mocha\lib\cli\cli.js -g Security -i test/node.test.ts test/integration.test.ts
        shell: bash
        env:
          MOCHA_INTEGRATION: node
          MOCHA_MAGICK_INSTALL: "node -e \"fs.symlinkSync(process.env.GITHUB_WORKSPACE, path.resolve('node_modules', 'magickwand.js'), os.platform() == 'win32' ? 'junction': 'dir')\""

