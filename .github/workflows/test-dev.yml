name: Node.js CI

on:
  push:
    branches: ["*"]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
  pull_request:
    branches: main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'

jobs:
  native:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform: 
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-12
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - run: pkg-config --cflags zlib
      - run: pkg-config --libs zlib
      - name: Setup Visual Studio
        uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
      - run: cc -o test-zlib test-zlib.c
        if: runner.os != 'Windows'
      - run: cl -o test-zlib test-zlib.c
        if: runner.os == 'Windows'
